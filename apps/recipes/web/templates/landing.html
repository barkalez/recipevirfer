{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes Project | Landing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
</head>
<body>
    <div class="gradient-glow glow-a"></div>
    <div class="gradient-glow glow-b"></div>
    <div class="ingredient-layer" id="ingredient-layer" aria-hidden="true"></div>

    <main class="hero container-fluid" id="hero">
        <div class="row g-0 justify-content-center w-100">
            <div class="col-12 col-sm-11 col-md-10 col-lg-8 col-xl-7">
                <div class="content-card px-3 px-sm-4 py-4 py-md-5">
                    <p class="kicker">Recipes Project</p>
                    <h1 class="hero-title">ENTRAR A LA COCINA</h1>
                    <p class="subtitle mx-auto">Descubre recetas, ingredientes y crea tus propios platos</p>
                    <div class="cta-wrap d-flex justify-content-center">
                        <a href="{% url 'home' %}" class="cta-btn">Entrar</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>
    <script src="{% static 'js/landing.js' %}" defer></script>
</body>
</html>
