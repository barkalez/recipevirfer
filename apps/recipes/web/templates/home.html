<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes Project | Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 2rem; background: #f9f7f3; color: #222; }

<body>
    <main class="card">
        <h1>Recipes Project</h1>

        <a class="btn" href="{% url 'ingredients-list' %}">Ver ingredientes</a>
        <a class="btn" href="/api/v1/health/">Health API</a>
        <a class="btn" href="/admin/">Admin</a>
