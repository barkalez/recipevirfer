<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes Project | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            --cream: #fff4dc;
            --cream-soft: #ffeccc;
            --tomato: #e94f37;
            --pepper: #bf2f24;
            --burnt: #2a130a;
            --carrot: #ff8a00;
        }

        * { box-sizing: border-box; }

        html,
        body {
            margin: 0;
            width: 100%;
            min-height: 100%;
        }

        body {
            background: linear-gradient(150deg, #fff1d4 0%, #ffc789 50%, #f06a43 100%);
            color: var(--burnt);
            font-family: "DM Sans", sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            width: min(34vw, 360px);
            height: min(34vw, 360px);
            border-radius: 999px;
            filter: blur(55px);
            z-index: 0;
            opacity: 0.28;
            pointer-events: none;
            animation: floatGlow 12s ease-in-out infinite alternate;
        }

        .bg-glow.one { top: -10%; left: -6%; background: #ff6d4c; }
        .bg-glow.two { bottom: -12%; right: -8%; background: #ffd27d; animation-delay: -3s; }

        .home-wrap {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: clamp(2rem, 7vh, 4.2rem) 1rem 2rem;
            animation: fadeUp 700ms ease-out both;
        }

        .panel {
            width: min(940px, 100%);
            text-align: center;
            background: rgba(255, 244, 220, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 24px;
            box-shadow: 0 22px 38px rgba(102, 33, 12, 0.18);
            backdrop-filter: blur(8px);
            padding: clamp(1.4rem, 2.8vw, 2.2rem);
        }

        .kicker {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(42, 19, 10, 0.68);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .home-title {
            margin: 0.35rem 0 0.5rem;
            font-family: "Bebas Neue", sans-serif;
            font-size: clamp(2.8rem, 8.2vw, 6rem);
            line-height: 0.95;
            letter-spacing: 0.04em;
            color: #7a210f;
            text-shadow: 0 8px 20px rgba(122, 33, 15, 0.18);
        }

        .subtitle {
            margin: 0 auto;
            max-width: 760px;
            color: #5e2617;
            font-size: clamp(1rem, 2.3vw, 1.25rem);
        }

        .actions {
            margin-top: clamp(1.4rem, 3vw, 2.2rem);
        }

        .action-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 62px;
            border: 0;
            border-radius: 14px;
            padding: 0.95rem 1rem;
            font-weight: 700;
            font-size: clamp(1rem, 2.1vw, 1.15rem);
            color: var(--cream);
            text-decoration: none;
            background: linear-gradient(145deg, var(--tomato), var(--pepper));
            box-shadow: 0 13px 24px rgba(138, 37, 17, 0.3);
            transform-origin: center;
            animation: softSwing 3.2s ease-in-out infinite;
            transition: transform 220ms ease, box-shadow 220ms ease, filter 220ms ease;
            overflow: hidden;
        }

        .action-btn::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.34), transparent 62%);
            opacity: 0;
            transition: opacity 220ms ease;
        }

        .action-btn.btn-2 {
            animation-delay: -0.8s;
            background: linear-gradient(145deg, #ef6d45, #b63a1f);
        }

        .action-btn.btn-3 {
            animation-delay: -1.6s;
            background: linear-gradient(145deg, #ff8a00, #be4a20);
        }

        .action-btn:hover {
            color: var(--cream);
            filter: brightness(1.05);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 18px 30px rgba(118, 30, 14, 0.36);
        }

        .action-btn.is-clicked {
            animation-play-state: paused;
            transform: scale(0.96);
            box-shadow: 0 8px 18px rgba(118, 30, 14, 0.28);
            filter: brightness(1.08);
        }

        .action-btn.is-clicked::after {
            opacity: 1;
            animation: pulseGlow 420ms ease-out;
        }

        .action-btn .label {
            transition: opacity 140ms ease;
        }

        .action-btn .loading {
            position: absolute;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 160ms ease, transform 160ms ease;
            font-size: 0.95em;
            font-weight: 700;
        }

        .action-btn.is-clicked .label {
            opacity: 0;
        }

        .action-btn.is-clicked .loading {
            opacity: 1;
            transform: translateY(0);
        }

        .back-link {
            margin-top: 1.1rem;
            display: inline-block;
            color: #8d260f;
            text-decoration: none;
            font-weight: 700;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .particle {
            position: fixed;
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 25%, #ffcf69, #d15a2a 72%);
            opacity: 0.36;
            pointer-events: none;
            z-index: 0;
            animation: particleDrift var(--dur, 9s) ease-in-out infinite;
        }

        .p1 { left: 8%; top: 18%; --dur: 11s; }
        .p2 { left: 21%; top: 73%; --dur: 9.5s; }
        .p3 { left: 84%; top: 27%; --dur: 10.4s; }
        .p4 { left: 72%; top: 82%; --dur: 8.7s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes softSwing {
            0%, 100% { transform: rotate(0.8deg); }
            50% { transform: rotate(-0.8deg); }
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(16px, -14px) scale(1.06); }
        }

        @keyframes particleDrift {
            0%, 100% { transform: translateY(0); opacity: 0.32; }
            50% { transform: translateY(-12px); opacity: 0.58; }
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.9); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        @media (max-width: 991.98px) {
            .home-wrap {
                padding-top: 1.6rem;
            }

            .panel {
                border-radius: 18px;
            }
        }
    </style>
</head>
<body>
    <span class="bg-glow one" aria-hidden="true"></span>
    <span class="bg-glow two" aria-hidden="true"></span>
    <span class="particle p1" aria-hidden="true"></span>
    <span class="particle p2" aria-hidden="true"></span>
    <span class="particle p3" aria-hidden="true"></span>
    <span class="particle p4" aria-hidden="true"></span>

    <main class="home-wrap container">
        <section class="panel">
            <p class="kicker">Recipes Project</p>
            <h1 class="home-title">Bienvenido a la cocina</h1>
            <p class="subtitle">Empieza a construir tu recetario con ingredientes, platos y menus semanales.</p>

            <div class="actions">
                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <a class="action-btn nav-btn" href="{% url 'add-ingredient' %}">
                            <span class="label">Anadir ingrediente</span>
                            <span class="loading">Abriendo...</span>
                        </a>
                    </div>
                    <div class="col-12 col-md-4">
                        <a class="action-btn btn-2 nav-btn" href="{% url 'add-recipe' %}">
                            <span class="label">Anadir receta</span>
                            <span class="loading">Abriendo...</span>
                        </a>
                    </div>
                    <div class="col-12 col-md-4">
                        <a class="action-btn btn-3 nav-btn" href="{% url 'create-weekly-menu' %}">
                            <span class="label">Crear menu semanal</span>
                            <span class="loading">Abriendo...</span>
                        </a>
                    </div>
                </div>
            </div>

            <a class="back-link" href="/">Volver a la landing</a>
        </section>
    </main>

    <script>
        const navButtons = document.querySelectorAll('.nav-btn');

        navButtons.forEach((btn) => {
            btn.addEventListener('click', (event) => {
                event.preventDefault();
                if (btn.classList.contains('is-clicked')) {
                    return;
                }

                const target = btn.getAttribute('href');
                btn.classList.add('is-clicked');

                setTimeout(() => {
                    window.location.href = target;
                }, 260);
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>
</body>
</html>
