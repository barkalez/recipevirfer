<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Recipes Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fff4dc;
            --tomato: #e94f37;
            --pepper: #bf2f24;
            --burnt: #2a130a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1rem;
            background: linear-gradient(145deg, #fff1d4 0%, #ffc280 45%, #ff7a4d 100%);
            color: var(--burnt);
            font-family: "DM Sans", sans-serif;
        }
        .card {
            width: min(760px, 100%);
            text-align: center;
            background: rgba(255, 245, 224, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 22px;
            padding: 2rem 1.2rem;
            box-shadow: 0 18px 34px rgba(104, 30, 12, 0.2);
        }
        h1 {
            margin: 0;
            font-family: "Bebas Neue", sans-serif;
            font-size: clamp(2.4rem, 8vw, 5rem);
            letter-spacing: 0.04em;
            color: #7d220f;
        }
        p {
            margin: 0.8rem 0 0;
            font-size: clamp(1rem, 2.4vw, 1.15rem);
            color: #5f2617;
        }
        a {
            display: inline-block;
            margin-top: 1.3rem;
            text-decoration: none;
            color: #fff4dc;
            background: linear-gradient(145deg, var(--tomato), var(--pepper));
            border-radius: 12px;
            padding: 0.75rem 1.2rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <section class="card">
        <h1>{{ title }}</h1>
        <p>{{ description }}</p>
        <a href="{% url 'home' %}">Volver a Home</a>
    </section>
</body>
</html>
